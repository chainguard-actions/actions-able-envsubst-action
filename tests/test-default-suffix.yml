name: Test default output suffix
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: "production"
      REGION: "us-east-1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create input file
        run: |
          mkdir -p /tmp/envsubst-suffix
          echo 'env=${ENVIRONMENT} region=${REGION}' > /tmp/envsubst-suffix/deploy.yaml

      - id: action
        uses: .
        with:
          working-directory: /tmp/envsubst-suffix
          input-file-pattern: "*.yaml"

      - name: Assert output file uses default .subst suffix
        run: |
          OUTPUT=$(cat /tmp/envsubst-suffix/deploy.yaml.subst)
          echo "actual: $OUTPUT"
          if [ "$OUTPUT" != "env=production region=us-east-1" ]; then
            echo "FAIL: expected 'env=production region=us-east-1' but got '$OUTPUT'"
            exit 1
          fi
          echo "PASS"
