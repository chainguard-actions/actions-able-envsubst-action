name: Test pattern-based file substitution
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_NAME: "myapp"
      APP_VERSION: "1.0.0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create input files matching pattern
        run: |
          mkdir -p /tmp/envsubst-pattern
          echo 'name=${APP_NAME}' > /tmp/envsubst-pattern/config.tmpl
          echo 'version=${APP_VERSION}' > /tmp/envsubst-pattern/version.tmpl

      - id: action
        uses: .
        with:
          working-directory: /tmp/envsubst-pattern
          input-file-pattern: "*.tmpl"
          output-file-suffix: ".out"

      - name: Assert config output file contains substituted value
        run: |
          OUTPUT=$(cat /tmp/envsubst-pattern/config.tmpl.out)
          echo "actual config: $OUTPUT"
          if [ "$OUTPUT" != "name=myapp" ]; then
            echo "FAIL: expected 'name=myapp', got '$OUTPUT'"
            exit 1
          fi
          echo "PASS config"

      - name: Assert version output file contains substituted value
        run: |
          OUTPUT=$(cat /tmp/envsubst-pattern/version.tmpl.out)
          echo "actual version: $OUTPUT"
          if [ "$OUTPUT" != "version=1.0.0" ]; then
            echo "FAIL: expected 'version=1.0.0', got '$OUTPUT'"
            exit 1
          fi
          echo "PASS version"
