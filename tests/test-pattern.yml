name: Test pattern-based file substitution
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_VERSION: "2.0.0"
      APP_NAME: "myapp"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create input files matching pattern
        run: |
          mkdir -p /tmp/envsubst-pattern
          echo 'name: ${APP_NAME}' > /tmp/envsubst-pattern/config1.tmpl
          echo 'version: ${APP_VERSION}' > /tmp/envsubst-pattern/config2.tmpl

      - id: action
        uses: .
        with:
          working-directory: /tmp/envsubst-pattern
          input-file-pattern: "*.tmpl"
          output-file-suffix: ".out"

      - name: Assert output files exist and have substituted content
        run: |
          OUT1=$(cat /tmp/envsubst-pattern/config1.out)
          OUT2=$(cat /tmp/envsubst-pattern/config2.out)
          echo "config1.out: $OUT1"
          echo "config2.out: $OUT2"
          if [ "$OUT1" != "name: myapp" ]; then
            echo "FAIL: config1.out expected 'name: myapp' but got '$OUT1'"
            exit 1
          fi
          if [ "$OUT2" != "version: 2.0.0" ]; then
            echo "FAIL: config2.out expected 'version: 2.0.0' but got '$OUT2'"
            exit 1
          fi
          echo "PASS"
