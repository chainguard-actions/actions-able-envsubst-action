name: Test single file substitution
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MY_NAME: "WorldTest"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create input file
        run: |
          mkdir -p /tmp/envsubst-test
          echo "Hello, \$MY_NAME!" > /tmp/envsubst-test/input.txt

      - id: action
        uses: .
        with:
          working-directory: /tmp/envsubst-test
          input-file: input.txt
          output-file: output.txt

      - name: Assert output file contains substituted value
        run: |
          OUTPUT=$(cat /tmp/envsubst-test/output.txt)
          echo "actual: $OUTPUT"
          if [ "$OUTPUT" != "Hello, WorldTest!" ]; then
            echo "FAIL: expected 'Hello, WorldTest!' but got '$OUTPUT'"
            exit 1
          fi
          echo "PASS"
